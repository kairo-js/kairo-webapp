version: "3.9"

services:

  front:
    build:
      context: ../front
    ports:
      - "3000:3000"
    volumes:
      - ../front:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - back

  back:
    build:
      context: ../back
    ports:
      - "8000:8000"
    volumes:
      - ../back:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=kairo
      - DB_PASSWORD=password
      - DB_NAME=kairo
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kairo
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kairo
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: